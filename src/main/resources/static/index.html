<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>WebViewer</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #101214;
            --panel: #191d21;
            --line: #2b3238;
            --text: #eef2f5;
            --muted: #9aa6af;
            --accent: #32b67a;
            --danger: #ff6b6b;
        }

        * { box-sizing: border-box; }

        html {
            width: 100%;
            height: 100%;
            background: #000;
        }

        body {
            margin: 0;
            width: 100%;
            min-height: 100vh;
            min-height: 100dvh;
            background: var(--bg);
            color: var(--text);
            font-family: "Segoe UI", Arial, sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }

        main {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            display: grid;
            grid-template-rows: minmax(0, 1fr) auto;
            overflow: hidden;
        }

        .viewport {
            position: relative;
            min-width: 0;
            min-height: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        video {
            position: absolute;
            left: 50%;
            top: 50%;
            width: var(--fit-width, 100%);
            height: var(--fit-height, 100%);
            max-width: none;
            max-height: none;
            object-fit: contain;
            display: block;
            background: #000;
            transform: translate3d(-50%, -50%, 0);
        }

        .video-controls {
            position: absolute;
            right: max(12px, env(safe-area-inset-right));
            bottom: max(12px, env(safe-area-inset-bottom));
            display: flex;
            gap: 8px;
            opacity: .86;
            transition: opacity .18s ease;
        }

        .viewport:hover .video-controls,
        .viewport:focus-within .video-controls {
            opacity: 1;
        }

        .video-controls button {
            min-width: 44px;
            width: 44px;
            height: 44px;
            padding: 0;
            color: var(--text);
            background: rgba(12, 14, 16, .78);
            border: 1px solid rgba(255, 255, 255, .18);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            font-size: 20px;
        }

        .toolbar {
            min-height: calc(64px + env(safe-area-inset-bottom));
            padding: 12px max(16px, env(safe-area-inset-right)) calc(12px + env(safe-area-inset-bottom)) max(16px, env(safe-area-inset-left));
            border-top: 1px solid var(--line);
            background: var(--panel);
            display: grid;
            grid-template-columns: minmax(180px, 1fr) auto auto;
            gap: 12px;
            align-items: center;
        }

        .status {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.35;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            min-width: 0;
        }

        input {
            width: min(280px, 40vw);
            height: 44px;
            border: 1px solid var(--line);
            border-radius: 6px;
            background: #0c0e10;
            color: var(--text);
            padding: 0 12px;
            font-size: 16px;
            min-width: 0;
            outline: none;
            user-select: text;
            -webkit-user-select: text;
        }

        button {
            min-width: 88px;
            height: 44px;
            border: 0;
            border-radius: 6px;
            padding: 0 18px;
            color: #05100b;
            background: var(--accent);
            font-weight: 700;
            cursor: pointer;
            font-size: 16px;
            touch-action: manipulation;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: .55;
        }

        @media (max-width: 700px) {
            .toolbar {
                grid-template-columns: minmax(0, 1fr) auto;
                gap: 10px;
                min-height: calc(110px + env(safe-area-inset-bottom));
                padding-top: 10px;
            }

            .status {
                grid-column: 1 / -1;
                white-space: normal;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
            }

            input {
                width: 100%;
            }

            button {
                min-width: 84px;
                padding: 0 16px;
            }
        }

        @media (max-width: 420px) {
            .toolbar {
                grid-template-columns: minmax(0, 1fr) 76px;
                gap: 8px;
                padding-left: max(10px, env(safe-area-inset-left));
                padding-right: max(10px, env(safe-area-inset-right));
            }

            button {
                min-width: 76px;
                padding: 0 10px;
            }
        }

        @media (orientation: landscape) and (max-height: 520px) {
            .toolbar {
                min-height: calc(56px + env(safe-area-inset-bottom));
                grid-template-columns: minmax(120px, 1fr) minmax(180px, 30vw) auto;
                padding-top: 6px;
                padding-bottom: calc(6px + env(safe-area-inset-bottom));
                gap: 8px;
            }

            .status {
                grid-column: auto;
                white-space: nowrap;
                display: block;
            }

            input,
            button {
                height: 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
<main>
    <div class="viewport">
        <video id="screen" autoplay muted playsinline disablepictureinpicture></video>
        <div class="video-controls">
            <button id="fullscreen" type="button" aria-label="&#20840;&#23631;" title="&#20840;&#23631;">&#9974;</button>
        </div>
    </div>
    <section class="toolbar">
        <div id="status" class="status">&#31561;&#24453;&#36830;&#25509;</div>
        <input id="password" type="password" autocomplete="current-password" placeholder="&#35775;&#38382;&#23494;&#30721;">
        <button id="connect" type="button">&#36830;&#25509;</button>
    </section>
</main>
<script src="/app.js" defer></script>
</body>
</html>
